<div class="row">
    {% for post in posts %}
    <div class="col-lg-4 col-md-6 mb-4">

        <div class="single-recent-blog-post">

            <div class="thumb">
                <img class="img-fluid latest-post-img"
                     src="{{ post.image.url }}"
                     alt="">
            </div>

            <div class="details">

                <div class="tags">
                    <ul>
                        {% for cat in post.Category.all %}
                        <li>
                            <a href="#">{{ cat.name }}</a>
                        </li>
                        {% endfor %}
                    </ul>
                </div>

                <a href="{% url 'blog:single' pid=post.id %}">
                    <h4 class="title">{{ post.title }}</h4>
                </a>

                <p>{{ post.content|truncatewords:15 }}</p>

                <h6 class="date">
                    {{ post.published_date|date:"d M Y" }}
                </h6>

            </div>

        </div>

    </div>
    {% endfor %}
</div>
